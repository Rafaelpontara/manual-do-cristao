name: palavra_viva
description: Palavra Viva - Seu Aplicativo Bíblico Completo
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  provider: ^6.1.1

  # Armazenamento local
  shared_preferences: ^2.2.2

  # Fontes bonitas
  google_fonts: ^6.2.1

  # Compartilhamento nativo
  share_plus: ^7.2.2

  # IDs únicos para notas
  uuid: ^4.3.3

  # Ícones
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
